    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Upload Medical Report</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        {% include 'header.html' %}
        <div class="container">
            <h1>📄 Upload Medical Report</h1>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <ul class="flashes">
                        {% for category, message in messages %}
                            <li class="{{ category }}">{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}
            <form method="POST" enctype="multipart/form-data" action="{{ url_for('report_mode') }}">
                <label for="report_file">Select PDF Report:</label>
                <input type="file" id="report_file" name="report_file" accept=".pdf" required>
                <button type="submit">Analyze Report</button>
            </form>
            <p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
        </div>
    </body>
    </html>
